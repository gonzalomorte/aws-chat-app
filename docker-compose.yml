version: "3.9"

services:
  backend:
    build: ./backend
    image: chat-backend
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build: ./frontend
    image: chat-frontend
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL}
    depends_on:
      - backend
